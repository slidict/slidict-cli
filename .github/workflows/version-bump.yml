name: Version Bump

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: read

jobs:
  bump-version:
    name: Bump patch version when missing
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${GITHUB_BASE_REF}:${GITHUB_BASE_REF}"

      - name: Bump patch version if unchanged
        id: bump
        env:
          VERSION_FILE: lib/slidict/version.rb
        run: |
          set -euo pipefail

          base_file=$(mktemp)
          git show "${GITHUB_BASE_REF}:${VERSION_FILE}" > "${base_file}"

          ruby - "${base_file}" "${VERSION_FILE}" "${GITHUB_OUTPUT}" <<'RUBY'
          base_path, head_path, output_path = ARGV

          def extract_version(path)
            version = File.read(path)[/VERSION\s*=\s*["'](\d+\.\d+\.\d+)["']/, 1]
            abort "Could not find version in #{path}" unless version

            version
          end

          base_version = extract_version(base_path)
          head_version = extract_version(head_path)

          puts "Base version: #{base_version}"
          puts "PR version: #{head_version}"

          if base_version != head_version
            puts "Version is already bumped in this pull request."
            File.open(output_path, "a") { |file| file.puts "bumped=false" }
            exit 0
          end

          major, minor, patch = head_version.split(".").map(&:to_i)
          new_version = [major, minor, patch + 1].join(".")
          contents = File.read(head_path)
          unless contents.sub!(/VERSION\s*=\s*["']\d+\.\d+\.\d+["']/, "VERSION = \"#{new_version}\"")
            abort "Could not update #{head_path}"
          end
          File.write(head_path, contents)

          File.open(output_path, "a") do |file|
            file.puts "new_version=#{new_version}"
            file.puts "bumped=true"
          end
          RUBY

      - name: Commit and push version bump
        if: steps.bump.outputs.bumped == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/slidict/version.rb
          git commit -m "chore: bump patch version to v${VERSION}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
